<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中辉绿建产品知识答题系统</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="view-home" class="view active">
      <div class="hero-card">
        <p class="eyebrow">ZHONGHUI QUIZ</p>
        <p class="brand-mark">中辉绿建</p>
        <h1>产品知识答题系统</h1>
        <p class="subtitle">覆盖通用类、快拼箱、折叠箱、拓展箱、太空舱</p>
        <div class="home-actions">
          <button id="btn-practice" class="btn btn-primary">练习模式</button>
          <button id="btn-review" class="btn btn-secondary">复习模式</button>
          <button id="btn-exam" class="btn btn-secondary">考试模式</button>
          <button id="btn-wrongbook" class="btn btn-secondary" disabled>错题本（0题）</button>
          <button id="btn-stats" class="btn btn-secondary">数据看板</button>
          <button id="btn-flashcard" class="btn btn-secondary">闪卡浏览</button>
          <button id="btn-roleplay" class="btn btn-secondary">模拟演练</button>
        </div>
      </div>
    </section>

    <section id="view-quiz" class="view">
      <header class="quiz-header">
        <div class="progress-track">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
        <div class="meta-row">
          <p id="question-number" class="muted"></p>
          <p id="question-category" class="pill"></p>
          <button id="btn-speak" class="btn-speak" type="button" aria-label="朗读">🔈 朗读</button>
          <button id="btn-exit" class="btn-exit hidden" type="button" aria-label="退出并保存">✕ 退出</button>
        </div>
      </header>

      <section class="quiz-card">
        <h2 id="question-text" class="question-text"></h2>
        <div id="options-container" class="options-container"></div>
        <div id="feedback-box" class="feedback-box hidden"></div>
        <div id="wb-mastery-hint" class="mastery-hint hidden" aria-live="polite"></div>
        <div class="quiz-actions">
          <button id="btn-confirm" class="btn btn-primary hidden">确认</button>
          <button id="btn-next" class="btn btn-primary hidden">下一题</button>
          <button id="btn-submit-exam" class="btn btn-primary hidden">提交考试</button>
        </div>
      </section>
    </section>

    <section id="view-results" class="view">
      <section class="result-card">
        <p class="eyebrow">RESULT</p>
        <h2 id="result-title"></h2>
        <p id="result-score" class="result-score"></p>
        <p id="result-status" class="result-status"></p>
        <p id="result-accuracy" class="muted hidden"></p>
      </section>

      <section class="wrong-section">
        <h3>错题回顾</h3>
        <div id="wrong-list" class="wrong-list"></div>
      </section>

      <div class="result-actions">
        <button id="btn-retry" class="btn btn-secondary hidden">再练一次</button>
        <button id="btn-home" class="btn btn-primary">返回首页</button>
      </div>
    </section>

    <section id="view-stats" class="view">
      <div class="stats-card">
        <div class="stats-header">
          <h2>数据看板</h2>
          <button id="btn-stats-home" class="btn btn-secondary">返回首页</button>
        </div>
        <div id="stats-categories" class="stats-categories"></div>
      </div>
    </section>

    <section id="view-flashcard" class="view">
      <header class="quiz-header">
        <div class="progress-track">
          <div id="fc-progress-bar" class="progress-fill"></div>
        </div>
        <div class="meta-row">
          <p id="fc-number" class="muted"></p>
          <p id="fc-category" class="pill"></p>
          <button id="btn-fc-speak" class="btn-speak" type="button" aria-label="朗读">🔈 朗读</button>
          <button id="btn-fc-exit" class="btn-exit" type="button" aria-label="退出闪卡浏览">✕ 退出</button>
        </div>
      </header>

      <button class="fc-scene" id="fc-card" type="button" aria-label="点击翻转卡片">
        <div class="fc-card-inner">
          <div class="fc-face fc-front">
            <p id="fc-question" class="fc-question-text"></p>
            <p id="fc-question-en" class="fc-en-text"></p>
            <p class="fc-flip-hint">点击卡片查看答案</p>
          </div>
          <div class="fc-face fc-back">
            <p id="fc-answer" class="fc-answer-text"></p>
            <p id="fc-answer-en" class="fc-en-text"></p>
            <p id="fc-explanation" class="fc-explanation-text"></p>
          </div>
        </div>
      </button>

      <div class="fc-nav">
        <button id="btn-fc-prev" class="btn btn-secondary">上一题</button>
        <button id="btn-fc-next" class="btn btn-primary">下一题</button>
      </div>
    </section>

    <section id="view-roleplay" class="view">
      <header class="rp-header">
        <button id="btn-rp-exit" class="btn-exit" type="button" aria-label="退出演练">← 退出</button>
        <h2 class="rp-title">模拟演练</h2>
        <button id="btn-rp-clear-key" class="btn-rp-clear-key" type="button">清除 Key</button>
        <button id="btn-rp-end" class="btn-rp-end" type="button" disabled>结束演练</button>
      </header>
      <div id="rp-chat" class="rp-chat"></div>
      <div class="rp-input-area">
        <textarea id="rp-input" class="rp-input" placeholder="输入你的回答..." rows="1"></textarea>
        <button id="btn-rp-send" class="btn-rp-send" type="button">发送</button>
      </div>
    </section>

    <section id="view-roleplay-result" class="view">
      <div class="rp-result-card">
        <h2 class="rp-result-title">演练评分报告</h2>
        <div id="rp-scores" class="rp-scores"></div>
        <p id="rp-total" class="rp-total"></p>
        <div id="rp-suggestions" class="rp-suggestions"></div>
      </div>
      <div class="rp-result-actions">
        <button id="btn-rp-again" class="btn btn-primary">再练一次</button>
        <button id="btn-rp-home" class="btn btn-secondary">返回首页</button>
      </div>
    </section>
  </main>

  <div id="resume-prompt" class="resume-modal hidden">
    <div class="resume-modal-box">
      <p id="resume-label" class="resume-label"></p>
      <div class="resume-actions">
        <button id="btn-resume" class="btn btn-primary">继续</button>
        <button id="btn-discard" class="btn btn-secondary">重新开始</button>
      </div>
    </div>
  </div>

  <div id="rp-key-modal" class="resume-modal hidden">
    <div class="resume-modal-box">
      <p class="resume-label">配置 AI 接口</p>
      <p class="rp-key-hint">配置仅存储在本地浏览器中，不会上传到任何服务器。</p>
      <label class="rp-field-label">Base URL</label>
      <input id="rp-base-url-input" type="text" class="rp-key-input" placeholder="https://api.openai.com" autocomplete="off" />
      <label class="rp-field-label" style="margin-top:10px">API Key</label>
      <input id="rp-key-input" type="password" class="rp-key-input" placeholder="sk-..." autocomplete="off" />
      <button id="btn-rp-key-confirm" class="btn btn-primary" style="margin-top:12px">确认</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="flashcards.js"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
